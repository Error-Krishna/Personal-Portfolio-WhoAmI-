services:
  - type: web
    name: krishna-portfolio
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn portfolio_core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --log-file -
    healthCheckPath: /health/
    autoDeploy: true
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: KRISH_ADMIN_PASSPHRASE
        sync: false
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "true"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "true"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "true"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "true"
